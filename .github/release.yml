# Configures GitHub's auto-generated release notes.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: "🚀 New Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧪 Tests"
      labels:
        - test
        - tests
    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - dependencies
        - refactor
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking-change
    - title: "Other Changes"
      labels:
        - "*"
